name: Tauri Release

# Thin caller. The pipeline (check -> tag -> build -> sign -> publish installers
# + updater latest.json) lives in the kit as a reusable workflow. On every push
# to main it releases if package.json's version has no matching v<version> tag
# yet, which pairs with `/commit pushnbump` (the version bump is the release
# trigger). Signing uses the repo secrets TAURI_SIGNING_PRIVATE_KEY +
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD, passed through via `secrets: inherit`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    uses: SirBepy/sirbepy_tauri_kit/.github/workflows/tauri-windows-release.yml@main
    with:
      asset-name: Server-Supervisor
    secrets: inherit
